<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FIP Field" />
  <meta name="format-detection" content="telephone=no" />
  <title>Fire Investigation Platform</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="brand-row">
        <div>
          <p class="eyebrow">Fire Investigation Platform</p>
          <h1 id="viewTitle">Case Overview</h1>
        </div>
        <button id="menuButton" class="icon-button" type="button" aria-expanded="false" aria-controls="sectionNav" aria-label="Open section navigation">☰</button>
      </div>
      <div id="caseRibbon" class="case-ribbon" aria-label="Case ribbon"></div>
    </header>

    <nav id="sectionNav" class="section-nav" aria-label="Sections"></nav>

    <main id="content" class="content" tabindex="-1"></main>
  </div>

  <input id="openFile" type="file" accept=".fip,application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
