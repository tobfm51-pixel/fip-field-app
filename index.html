<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fire Field Notes" />
  <meta name="theme-color" content="#111827" />
  <title>Fire Investigation Field Notes</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="rail" aria-label="Primary navigation">
      <button class="rail-btn active" data-screen="dashboard" title="Dashboard">⌂<span>Home</span></button>
      <button class="rail-btn" data-screen="initial" title="Initial">🚒<span>Initial</span></button>
      <button class="rail-btn" data-screen="scene" title="Scene">◇<span>Scene</span></button>
      <button class="rail-btn" data-screen="building" data-incident-module="structure" title="Building">⌂<span>Bldg</span></button>
      <button class="rail-btn" data-screen="utilities" data-incident-module="structure" title="Utilities">⚡<span>Util</span></button>
      <button class="rail-btn" data-screen="electrical" data-incident-module="structure" title="Electrical">⏚<span>Elec</span></button>
      <button class="rail-btn" data-screen="exterior" data-incident-module="structure" title="Exterior">▱<span>Exterior</span></button>
      <button class="rail-btn" data-screen="roof" data-incident-module="structure" title="Roof">⌃<span>Roof</span></button>
      <button class="rail-btn" data-screen="interior" data-incident-module="structure" title="Interior">▦<span>Interior</span></button>
      <button class="rail-btn" data-screen="people" title="People">👥<span>People</span></button>
      <button class="rail-btn" data-screen="vehicles" data-incident-module="vehicle" title="Vehicles">🚗<span>Vehicle</span></button>
      <button class="rail-btn" data-screen="machinery" data-incident-module="machinery" title="Machinery">⚙<span>Machine</span></button>
      <button class="rail-btn" data-screen="exposures" data-incident-module="exposure" title="Exposure Structures">⌂<span>Expose</span></button>
      <button class="rail-btn" data-screen="rooms" data-incident-module="structure" title="Rooms">▦<span>Rooms</span></button>
      <button class="rail-btn" data-screen="smokeAlarms" data-incident-module="structure" title="Smoke Alarms">◉<span>Smoke</span></button>
      <button class="rail-btn" data-screen="decks" data-incident-module="structure" title="Decks">▤<span>Deck</span></button>
      <button class="rail-btn" data-screen="areaOrigin" title="Area of Origin">◎<span>Origin</span></button>
      <button class="rail-btn" data-screen="firePatterns" title="Fire Patterns">▧<span>Pattern</span></button>
      <button class="rail-btn" data-screen="ignitionSources" title="Ignition Sources">♨<span>Ignition</span></button>
      <button class="rail-btn" data-screen="ignitionMatrix" title="Ignition Matrix">▥<span>Matrix</span></button>
      <button class="rail-btn" data-screen="photos" title="Photos">📷<span>Photos</span></button>
      <button class="rail-btn" data-screen="timeline" title="Timeline">🕘<span>Time</span></button>
      <button class="rail-btn" data-screen="evidence" title="Evidence">▣<span>Evidence</span></button>
      <button class="rail-btn" data-screen="interviews" title="Interviews">❝<span>Interview</span></button>
      <button class="rail-btn" data-screen="reports" title="Reports">▤<span>Report</span></button>
      <button class="rail-btn" data-screen="files" title="Files">⇪<span>Files</span></button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><div class="eyebrow">FIP Alpha 1.2</div><h1 id="screenTitle">Fire Investigation Field Notes</h1></div>
        <div class="status"><span id="saveStatus">Autosaved</span></div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>
  <input id="importFile" type="file" accept=".fip,application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
