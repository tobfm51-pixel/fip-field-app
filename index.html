<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FIP Field" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#111827" />
  <meta name="format-detection" content="telephone=no" />
  <title>Fire Investigation Field Notes</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <div class="eyebrow">FIP Alpha 1.2 · Mobile PWA</div>
        <h1 id="screenTitle">Fire Investigation Field Notes</h1>
      </div>
      <div class="status"><span id="saveStatus">Autosaved</span></div>
      <div id="caseRibbon" class="case-ribbon" aria-label="Case ribbon"></div>
    </header>

    <nav id="sectionNav" class="rail" aria-label="Primary section navigation"></nav>

    <main class="main">
      <section id="content" class="content"></section>
    </main>
  </div>
  <input id="importFile" type="file" accept=".fip,application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
